<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="container">
    <h1>Library Management System</h1>

    <section class="card">
        <h2>Add Book</h2>
        <form id="addBookForm">
            <label for="bookId">Book ID</label>
            <input id="bookId" type="text" placeholder="B001">

            <label for="title">Title</label>
            <input id="title" type="text" placeholder="Clean Code">

            <label for="author">Author</label>
            <input id="author" type="text" placeholder="Robert C. Martin">

            <label for="pages">Pages</label>
            <input id="pages" type="number" placeholder="464">

            <button id="addBookBtn" type="submit">Add Book</button>
        </form>
    </section>

    <section class="card">
        <h2>Search Books</h2>
        <input id="searchInput" type="text" placeholder="Search by title">
        <button id="searchBtn" type="button">Search</button>
        <button id="resetSearchBtn" type="button">Reset</button>
    </section>

    <section class="card">
        <h2>Borrow / Return</h2>

        <div class="action-row">
            <input id="borrowBookId" type="text" placeholder="Book ID">
            <input id="memberName" type="text" placeholder="Member Name">
            <button id="borrowBtn" type="button">Borrow</button>
        </div>

        <div class="action-row">
            <input id="returnBookId" type="text" placeholder="Book ID">
            <button id="returnBtn" type="button">Return</button>
        </div>
    </section>

    <p id="message" class="message" role="status"></p>

    <section class="card">
        <h2>Book List</h2>
        <table id="bookTable">
            <thead>
            <tr>
                <th>Book ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Pages</th>
                <th>Status</th>
                <th>Borrowed By</th>
            </tr>
            </thead>
            <tbody id="bookTableBody"></tbody>
        </table>
    </section>

    <section class="card">
        <h2>Borrow History</h2>
        <table id="historyTable">
            <thead>
            <tr>
                <th>Book ID</th>
                <th>Member</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
        </table>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
